name: Helm CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  HELM_CHART_PATH: ./k8s-demo
  RELEASE_NAME: my-release
  NAMESPACE: default

jobs:
  lint-test:
    name: Lint & Helm Template Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: helm lint $HELM_CHART_PATH

      - name: Helm Template
        run: helm template $RELEASE_NAME $HELM_CHART_PATH

  deploy:
    name: Deploy to Kind
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: Verify cluster
        run: kubectl get nodes

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm Upgrade/Install
        run: |
          helm upgrade --install $RELEASE_NAME $HELM_CHART_PATH \
            --namespace $NAMESPACE \
            --create-namespace \
            --wait \
            --timeout 10m

      - name: Debug deployment
        if: always()
        run: |
          kubectl get all -n $NAMESPACE
          kubectl describe deployment $RELEASE_NAME-k8s-demo -n $NAMESPACE || true
          kubectl get pods -n $NAMESPACE -o wide
          kubectl describe pods -n $NAMESPACE || true
      
      - name: Pod logs
        if: always()
        run: |
          for pod in $(kubectl get pods -n $NAMESPACE -o name); do
            echo "===== $pod ====="
            kubectl logs -n $NAMESPACE ${pod#pod/} --all-containers=true || true
          done

      - name: Verify resources
        run: |
          kubectl get all -n $NAMESPACE